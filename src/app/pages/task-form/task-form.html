<div class="form-page">
  <div class="form-card">
    <h2>{{ isEditMode ? 'Edit Task' : 'Add Task' }}</h2>

    <form [formGroup]="taskForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="title">Task Title</label>
        <input id="title" type="text" formControlName="title" class="input" />

        <div class="error" *ngIf="title?.touched && title?.invalid">
          <small *ngIf="title?.errors?.['required']">Title is required.</small>
          <small *ngIf="title?.errors?.['minlength']">
            Title must be at least 3 characters.
          </small>
        </div>
      </div>

      <div class="form-group">
        <label for="status">Task Status</label>
        <select id="status" formControlName="status" class="input">
          <option *ngFor="let status of statuses" [value]="status">
            {{ status }}
          </option>
        </select>
      </div>

      <div class="buttons">
        <button type="submit" class="btn primary">
          {{ isEditMode ? 'Update Task' : 'Save Task' }}
        </button>

        <a routerLink="/" class="btn cancel">Cancel</a>
      </div>
    </form>
  </div>
</div>
